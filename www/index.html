<!DOCTYPE html>
<head>
    <meta charset="UTF-8">
    <link href="index.css" rel="stylesheet">
    <link rel="stylesheet" href="plyr.css" />
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>嘉乐周的光影世界</title>
</head>
<body>
<div class="navbar">
    <div class="back-button" onclick="goPrevDir()">⬅️</div>
    <div id="title"></div>
    <div></div>
</div>
<div id="view-settings">
</div>
<div id="imageGrid"></div>
<div id="viewer">
    <div class="close-button" onclick="closeImageViewer()">✖</div>
    <div id="image-viewer-text"></div>
    <img id="viewerImage"/>
    <video controls crossorigin playsinline id="player"></video>
    <div class="controls">
        <button onclick="prevImage()">⬅️</button>
        <button onclick="downloadImage()">💾</button>
        <button onclick="showExif()">📷</button>
        <button onclick="nextImage()">➡️</button>
    </div>
</div>
</body>
<script src="index.js"></script>
<script src="plyr.js"></script>
<script src="exif.js"></script>
